<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar - Crypto & Finance Events 2026-2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #2c3e50;
            --text-secondary: #6c757d;
            --accent-green: #10b981;
            --accent-green-light: #d1fae5;
            --border: #e5e7eb;
            --hover: #f9fafb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            background: var(--bg-primary);
            padding: 24px 40px;
            border-bottom: 2px solid var(--accent-green);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            color: var(--accent-green);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-right: 8px;
            align-self: center;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--hover);
            border-color: var(--accent-green);
        }

        .btn.active {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .quarter-view {
            display: none;
        }

        .quarter-view.active {
            display: block;
        }

        .month-section {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .month-header {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent-green);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .day-header {
            background: var(--bg-secondary);
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .day-cell {
            background: var(--bg-primary);
            min-height: 100px;
            padding: 8px;
            position: relative;
        }

        .day-cell.other-month {
            background: var(--bg-secondary);
            opacity: 0.5;
        }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .event {
            padding: 4px 8px;
            margin-bottom: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            line-height: 1.3;
            border-left: 3px solid;
        }

        .event:hover {
            transform: translateX(2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .event.small {
            font-size: 11px;
        }

        .event.medium {
            font-size: 13px;
        }

        .event.large {
            font-size: 15px;
            font-weight: 600;
        }

        .event.crypto {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-green);
            color: #059669;
        }

        .event.finance {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: #2563eb;
        }

        .event.both {
            background: rgba(168, 85, 247, 0.1);
            border-color: #a855f7;
            color: #7c3aed;
        }

        .event.multi-day {
            font-style: italic;
        }

        .add-event-section {
            background: var(--bg-primary);
            padding: 30px;
            border-radius: 12px;
            border: 2px dashed var(--accent-green);
            margin-top: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .add-event-section h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .url-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .url-input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-secondary);
        }

        .url-input-group input:focus {
            outline: none;
            border-color: var(--accent-green);
            background: var(--bg-primary);
        }

        .url-input-group button {
            padding: 12px 24px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .url-input-group button:hover {
            background: #059669;
        }

        .manual-form {
            display: none;
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .manual-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-primary);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .form-actions button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-actions .submit {
            background: var(--accent-green);
            color: white;
        }

        .form-actions .cancel {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .event-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .event-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .modal-header h2 {
            flex: 1;
            color: var(--text-primary);
            font-size: 24px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            width: 32px;
            height: 32px;
        }

        .modal-body p {
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .modal-body strong {
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-actions .edit-btn {
            background: var(--accent-green);
            color: white;
        }

        .modal-actions .delete-btn {
            background: #ef4444;
            color: white;
        }

        .modal-actions .visit-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .spinner {
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent-green);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-green);
            color: #059669;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                font-size: 12px;
            }

            .day-cell {
                min-height: 80px;
                padding: 4px;
            }

            .event {
                font-size: 10px !important;
                padding: 2px 4px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                flex-wrap: wrap;
            }
        }
    </style>

        <div class="controls">

                <button class="btn" onclick="switchYear(2027)">2027</button>
            </div>
            <div class="control-group">
                <label>Quarter:</label>
                <button class="btn active" onclick="switchQuarter('Q1')">Q1</button>
                <button class="btn" onclick="switchQuarter('Q2')">Q2</button>
                <button class="btn" onclick="switchQuarter('Q3')">Q3</button>
                <button class="btn" onclick="switchQuarter('Q4')">Q4</button>
            </div>
            <div class="control-group">
                <label>Region:</label>
                <button class="btn active" onclick="filterRegion('all')">All</button>
                <button class="btn" onclick="filterRegion('North America')">North America</button>
                <button class="btn" onclick="filterRegion('Europe')">Europe</button>
                <button class="btn" onclick="filterRegion('Asia')">Asia</button>
                <button class="btn" onclick="filterRegion('Middle East')">Middle East</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Quarter views will be generated here -->

        <!-- Add Event Section -->

                <button onclick="scrapeEvent()">Add Event</button>

            <p style="font-size: 14px; color: var(--text-secondary); margin-top: 12px;">
                Or <a href="#" onclick="showManualForm(); return false;" style="color: var(--accent-green); font-weight: 600;">add manually</a>
            </p>

            <div id="manualForm" class="manual-form">
                <h4 style="margin-bottom: 16px;">Manual Event Entry</h4>
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="manualName" placeholder="e.g., Digital Asset Summit 2026">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="manualStartDate">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="manualEndDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="manualLocation" placeholder="New York, NY">
                    </div>
                    <div class="form-group">
                        <label>Region</label>
                        <select id="manualRegion">
                            <option value="North America">North America</option>
                            <option value="Europe">Europe</option>
                            <option value="Asia">Asia</option>
                            <option value="Middle East">Middle East</option>
                            <option value="Latin America">Latin America</option>
                            <option value="Africa">Africa</option>
                            <option value="Oceania">Oceania</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expected Attendance</label>
                        <input type="number" id="manualAttendance" placeholder="e.g., 10000">
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="manualType">
                            <option value="crypto">Crypto-Native</option>
                            <option value="finance">Institutional Finance</option>
                            <option value="both">Both</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Event URL</label>
                    <input type="url" id="manualUrl" placeholder="https://...">
                </div>
                <div class="form-actions">
                    <button class="submit" onclick="addManualEvent()">Add Event</button>
                    <button class="cancel" onclick="hideManualForm()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div id="eventModal" class="event-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="visit-btn" onclick="visitEvent()">Visit Website</button>
                <button class="edit-btn" onclick="editEvent()">Edit</button>
                <button class="delete-btn" onclick="deleteEvent()">Delete</button>
            </div>
        </div>
    </div>

                'Q3': [6, 7, 8],  // Jul, Aug, Sep
                'Q4': [9, 10, 11] // Oct, Nov, Dec
            };
            return quarters[quarter];
        }

        function getSizeClass(attendance) {
            if (attendance < 5000) return 'small';
            if (attendance <= 15000) return 'medium';
            return 'large';
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }

        function getFirstDayOfMonth(year, month) {
            return new Date(year, month, 1).getDay();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function isDateInRange(date, startDate, endDate) {
            const d = new Date(date);
            const start = new Date(startDate);
            const end = new Date(endDate);
            return d >= start && d <= end;
        }

        // UI Functions
        function switchYear(year) {
            currentYear = year;
            document.querySelectorAll('.controls .control-group:first-child .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderCalendar();
        }

        function switchQuarter(quarter) {
            currentQuarter = quarter;
            document.querySelectorAll('.controls .control-group:nth-child(2) .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderCalendar();
        }

        function filterRegion(region) {
            currentRegion = region;
            document.querySelectorAll('.controls .control-group:nth-child(3) .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderCalendar();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';

            const months = getQuarterMonths(currentQuarter);
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 
                              'July', 'August', 'September', 'October', 'November', 'December'];

            months.forEach(monthIndex => {
                const monthSection = document.createElement('div');
                monthSection.className = 'month-section';

                const header = document.createElement('div');
                header.className = 'month-header';
                header.textContent = `${monthNames[monthIndex]} ${currentYear}`;
                monthSection.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'calendar-grid';

                // Day headers
                ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'day-header';
                    dayHeader.textContent = day;
                    grid.appendChild(dayHeader);
                });

                // Calculate calendar days
                const daysInMonth = getDaysInMonth(currentYear, monthIndex);
                const firstDay = getFirstDayOfMonth(currentYear, monthIndex);

                // Previous month padding
                for (let i = 0; i < firstDay; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'day-cell other-month';
                    grid.appendChild(cell);
                }

                // Current month days
                for (let day = 1; day <= daysInMonth; day++) {
                    const cell = document.createElement('div');
                    cell.className = 'day-cell';

                    const dayNumber = document.createElement('div');
                    dayNumber.className = 'day-number';
                    dayNumber.textContent = day;
                    cell.appendChild(dayNumber);

                    // Add events for this day
                    const dateStr = `${currentYear}-${String(monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    
                    events.forEach(event => {
                        if (currentRegion !== 'all' && event.region !== currentRegion) return;
                        
                        if (isDateInRange(dateStr, event.startDate, event.endDate)) {
                            const eventEl = document.createElement('div');
                            eventEl.className = `event ${getSizeClass(event.attendance)} ${event.type}`;
                            
                            const start = new Date(event.startDate);
                            const end = new Date(event.endDate);
                            const isMultiDay = start.getTime() !== end.getTime();
                            
                            if (isMultiDay) {
                                eventEl.classList.add('multi-day');
                            }
                            
                            eventEl.textContent = event.name;
                            eventEl.onclick = () => showEventDetails(event);
                            cell.appendChild(eventEl);
                        }
                    });

                    grid.appendChild(cell);
                }

                monthSection.appendChild(grid);
                container.appendChild(monthSection);
            });
        }

        function showEventDetails(event) {
            selectedEvent = event;
            const modal = document.getElementById('eventModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            title.textContent = event.name;
            
            const start = formatDate(event.startDate);
            const end = formatDate(event.endDate);
            const dateRange = start === end ? start : `${start} - ${end}`;

            body.innerHTML = `
                <p><strong>📅 Date:</strong> ${dateRange}</p>
                <p><strong>📍 Location:</strong> ${event.location}</p>
                <p><strong>🌍 Region:</strong> ${event.region}</p>
                <p><strong>👥 Expected Attendance:</strong> ${event.attendance.toLocaleString()}</p>
                <p><strong>🏷️ Type:</strong> ${event.type.charAt(0).toUpperCase() + event.type.slice(1)}</p>
                <p><strong>🔗 Website:</strong> <a href="${event.url}" target="_blank" style="color: var(--accent-green);">${event.url}</a></p>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
            selectedEvent = null;
        }

        function visitEvent() {
            if (selectedEvent && selectedEvent.url) {
                window.open(selectedEvent.url, '_blank');
            }
        }

        function editEvent() {
            if (!selectedEvent) return;
            
            closeModal();
            
            // Pre-fill manual form with event data
            document.getElementById('manualName').value = selectedEvent.name;
            document.getElementById('manualStartDate').value = selectedEvent.startDate;
            document.getElementById('manualEndDate').value = selectedEvent.endDate;
            document.getElementById('manualLocation').value = selectedEvent.location;
            document.getElementById('manualRegion').value = selectedEvent.region;
            document.getElementById('manualAttendance').value = selectedEvent.attendance;
            document.getElementById('manualType').value = selectedEvent.type;
            document.getElementById('manualUrl').value = selectedEvent.url;
            
            showManualForm();
            
            // Change submit button to "Update"
            const submitBtn = document.querySelector('.manual-form .submit');
            submitBtn.textContent = 'Update Event';
            submitBtn.onclick = () => updateEvent();
        }

        function updateEvent() {
            const index = events.findIndex(e => e.id === selectedEvent.id);
            if (index === -1) return;
            
            events[index] = {
                ...selectedEvent,
                name: document.getElementById('manualName').value,
                startDate: document.getElementById('manualStartDate').value,
                endDate: document.getElementById('manualEndDate').value,
                location: document.getElementById('manualLocation').value,
                region: document.getElementById('manualRegion').value,
                attendance: parseInt(document.getElementById('manualAttendance').value),
                type: document.getElementById('manualType').value,
                url: document.getElementById('manualUrl').value
            };
            
            hideManualForm();
            renderCalendar();
            alert('✓ Event updated successfully!');
            
            // Reset submit button
            const submitBtn = document.querySelector('.manual-form .submit');
            submitBtn.textContent = 'Add Event';
            submitBtn.onclick = () => addManualEvent();
        }

        function deleteEvent() {
            if (!selectedEvent) return;
            
            if (confirm(`Are you sure you want to delete "${selectedEvent.name}"?`)) {
                events = events.filter(e => e.id !== selectedEvent.id);
                closeModal();
                renderCalendar();
                alert('✓ Event deleted successfully!');
            }
        }

        function showManualForm() {
            document.getElementById('manualForm').classList.add('active');
        }

        function hideManualForm() {
            document.getElementById('manualForm').classList.remove('active');
            // Clear form
            document.getElementById('manualName').value = '';
            document.getElementById('manualStartDate').value = '';
            document.getElementById('manualEndDate').value = '';
            document.getElementById('manualLocation').value = '';
            document.getElementById('manualAttendance').value = '';
            document.getElementById('manualUrl').value = '';
        }

        async function scrapeEvent() {
            const url = document.getElementById('eventUrl').value;
            if (!url) {
                alert('Please enter an event URL');
                return;
            }

            // Show loading state
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Scraping...';

            try {
                // Try to fetch and parse the page
                // In a real implementation, you'd use a backend or proxy to avoid CORS
                // For now, show manual form as fallback
                
                setTimeout(() => {
                    alert('Auto-scrape not available in demo mode. Please use manual entry.');
                    showManualForm();
                    document.getElementById('manualUrl').value = url;
                    btn.disabled = false;
                    btn.textContent = 'Add Event';
                }, 1000);

            } catch (error) {
                alert('Could not scrape URL. Please use manual entry.');
                showManualForm();
                document.getElementById('manualUrl').value = url;
                btn.disabled = false;
                btn.textContent = 'Add Event';
            }
        }

        function addManualEvent() {
            const name = document.getElementById('manualName').value;
            const startDate = document.getElementById('manualStartDate').value;
            const endDate = document.getElementById('manualEndDate').value;
            const location = document.getElementById('manualLocation').value;
            const region = document.getElementById('manualRegion').value;
            const attendance = parseInt(document.getElementById('manualAttendance').value);
            const type = document.getElementById('manualType').value;
            const url = document.getElementById('manualUrl').value;

            if (!name || !startDate || !endDate || !location || !attendance || !url) {
                alert('Please fill in all required fields');
                return;
            }

            // Check for duplicates
            const duplicate = events.find(e => 
                e.name.toLowerCase() === name.toLowerCase() && 
                e.startDate === startDate
            );

            if (duplicate) {
                if (!confirm('An event with this name and date already exists. Add anyway?')) {
                    return;
                }
            }

            const newEvent = {
                id: Math.max(...events.map(e => e.id)) + 1,
                name,
                startDate,
                endDate,
                location,
                region,
                attendance,
                type,
                url
            };

            events.push(newEvent);
            hideManualForm();
            renderCalendar();
            
            document.getElementById('eventUrl').value = '';
            
            alert('✓ Event added successfully!');
        }

        // Initialize
        renderCalendar();

        // Close modal on outside click
        document.getElementById('eventModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
