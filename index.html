<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar - Crypto & Institutional Finance Events 2026-2027</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --text-primary: #2c3e50;
            --text-secondary: #6c757d;
            --accent-green: #10b981;
            --accent-green-light: #d1fae5;
            --border: #e5e7eb;
            --hover: #f9fafb;
            --tier1: #10b981;
            --tier2: #fbbf24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .header {
            background: var(--bg-primary);
            padding: 24px 40px;
            border-bottom: 2px solid var(--accent-green);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 28px;
            color: var(--accent-green);
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-right: 8px;
            align-self: center;
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--hover);
            border-color: var(--accent-green);
        }

        .btn.active {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .quarter-view {
            display: none;
        }

        .quarter-view.active {
            display: block;
        }

        .month-section {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .month-header {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent-green);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .day-header {
            background: var(--bg-secondary);
            padding: 12px 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .day-cell {
            background: var(--bg-primary);
            min-height: 120px;
            padding: 8px;
            position: relative;
        }

        .day-cell.other-month {
            background: var(--bg-secondary);
            opacity: 0.5;
        }

        .day-cell.conflict {
            background: rgba(239, 68, 68, 0.05);
        }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .event {
            padding: 4px 8px;
            margin-bottom: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            line-height: 1.3;
            border-left: 3px solid;
            position: relative;
        }

        .event:hover {
            transform: translateX(2px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .event.small {
            font-size: 11px;
        }

        .event.medium {
            font-size: 13px;
        }

        .event.large {
            font-size: 15px;
            font-weight: 600;
        }

        .event.crypto {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-green);
            color: #059669;
        }

        .event.institutional {
            background: rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
            color: #2563eb;
        }

        .event.crossover {
            background: rgba(168, 85, 247, 0.1);
            border-color: #a855f7;
            color: #7c3aed;
        }

        .event.estimated::after {
            content: '~';
            position: absolute;
            right: 4px;
            top: 2px;
            font-weight: bold;
        }

        .tier-badge {
            display: inline-block;
            margin-right: 4px;
        }

        .tier-1 {
            color: var(--tier1);
            font-size: 12px;
        }

        .tier-1::before {
            content: '⭐';
        }

        .tier-2 {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--tier2);
        }

        .event.tier-1-event {
            font-weight: 700 !important;
        }

        .add-event-section {
            background: var(--bg-primary);
            padding: 30px;
            border-radius: 12px;
            border: 2px dashed var(--accent-green);
            margin-top: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .add-event-section h3 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .url-input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .url-input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-secondary);
        }

        .url-input-group input:focus {
            outline: none;
            border-color: var(--accent-green);
            background: var(--bg-primary);
        }

        .url-input-group button {
            padding: 12px 24px;
            background: var(--accent-green);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .url-input-group button:hover {
            background: #059669;
        }

        .manual-form {
            display: none;
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .manual-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-primary);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .form-actions button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-actions .submit {
            background: var(--accent-green);
            color: white;
        }

        .form-actions .cancel {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .event-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .event-modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            padding: 30px;
            border-radius: 12px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }

        .modal-header h2 {
            flex: 1;
            color: var(--text-primary);
            font-size: 24px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0;
            width: 32px;
            height: 32px;
        }

        .modal-body p {
            margin-bottom: 12px;
            line-height: 1.8;
        }

        .modal-body strong {
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-actions .edit-btn {
            background: var(--accent-green);
            color: white;
        }

        .modal-actions .delete-btn {
            background: #ef4444;
            color: white;
        }

        .modal-actions .visit-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .conflict-badge {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
            display: inline-block;
        }

        .legend {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .legend-title {
            font-weight: 600;
            margin-bottom: 12px;
        }

        .legend-items {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                font-size: 12px;
            }

            .day-cell {
                min-height: 100px;
                padding: 4px;
            }

            .event {
                font-size: 10px !important;
                padding: 2px 4px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗓️ Event Calendar 2026-2027</h1>
        <div class="controls">
            <div class="control-group">
                <label>Year:</label>
                <button class="btn active" onclick="switchYear(2026)">2026</button>
                <button class="btn" onclick="switchYear(2027)">2027</button>
            </div>
            <div class="control-group">
                <label>Quarter:</label>
                <button class="btn active" onclick="switchQuarter('Q1')">Q1</button>
                <button class="btn" onclick="switchQuarter('Q2')">Q2</button>
                <button class="btn" onclick="switchQuarter('Q3')">Q3</button>
                <button class="btn" onclick="switchQuarter('Q4')">Q4</button>
            </div>
            <div class="control-group">
                <label>Region:</label>
                <button class="btn active" onclick="filterRegion('all')">All</button>
                <button class="btn" onclick="filterRegion('North America')">North America</button>
                <button class="btn" onclick="filterRegion('Europe')">Europe</button>
                <button class="btn" onclick="filterRegion('Asia')">Asia</button>
                <button class="btn" onclick="filterRegion('Middle East')">Middle East</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="legend">
            <div class="legend-title">Legend</div>
            <div class="legend-items">
                <div class="legend-item">
                    <span class="tier-badge tier-1"></span> <strong>Tier 1: Flagship/Must-Attend</strong>
                </div>
                <div class="legend-item">
                    <span class="tier-badge tier-2"></span> Tier 2: Regional/Niche
                </div>
                <div class="legend-item">
                    <span style="color: var(--accent-green);">■</span> Digital Asset
                </div>
                <div class="legend-item">
                    <span style="color: #3b82f6;">■</span> Institutional
                </div>
                <div class="legend-item">
                    <span style="color: #a855f7;">■</span> Crossover
                </div>
                <div class="legend-item">
                    <strong>~</strong> = Estimated dates
                </div>
            </div>
        </div>

        <div id="calendar-container"></div>

        <div class="add-event-section">
            <h3>➕ Add New Event</h3>
            <div class="url-input-group">
                <input type="url" id="eventUrl" placeholder="Paste event page URL here...">
                <button onclick="scrapeEvent()">Add Event</button>
            </div>
            <p style="font-size: 14px; color: var(--text-secondary); margin-top: 12px;">
                Or <a href="#" onclick="showManualForm(); return false;" style="color: var(--accent-green); font-weight: 600;">add manually</a>
            </p>

            <div id="manualForm" class="manual-form">
                <h4 style="margin-bottom: 16px;">Manual Event Entry</h4>
                <div class="form-group">
                    <label>Event Name</label>
                    <input type="text" id="manualName" placeholder="e.g., Digital Asset Summit 2026">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="manualStartDate">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="manualEndDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="manualLocation" placeholder="New York, NY">
                    </div>
                    <div class="form-group">
                        <label>Region</label>
                        <select id="manualRegion">
                            <option value="North America">North America</option>
                            <option value="Europe">Europe</option>
                            <option value="Asia">Asia</option>
                            <option value="Middle East">Middle East</option>
                            <option value="Latin America">Latin America</option>
                            <option value="Africa">Africa</option>
                            <option value="Oceania">Oceania</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Expected Attendance</label>
                        <input type="number" id="manualAttendance" placeholder="e.g., 10000">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="manualType">
                            <option value="crypto">Digital Asset</option>
                            <option value="institutional">Institutional</option>
                            <option value="crossover">Crossover</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tier</label>
                        <select id="manualTier">
                            <option value="1">Tier 1 - Flagship/Must-Attend</option>
                            <option value="2">Tier 2 - Regional/Niche</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estimated Dates?</label>
                        <select id="manualEstimated">
                            <option value="false">No - Confirmed</option>
                            <option value="true">Yes - Estimated</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Audience (comma-separated)</label>
                    <input type="text" id="manualAudience" placeholder="e.g., Institutional Investors, Founders, Policy">
                </div>
                <div class="form-group">
                    <label>Event URL</label>
                    <input type="url" id="manualUrl" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Digital Asset Relevance (optional)</label>
                    <select id="manualDigitalAssetRelevance">
                        <option value="">-- None --</option>
                        <option value="Yes">Yes</option>
                        <option value="Emerging">Emerging</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="manualNotes" rows="3" placeholder="Key themes, who attends, why it matters..."></textarea>
                </div>
                <div class="form-actions">
                    <button class="submit" onclick="addManualEvent()">Add Event</button>
                    <button class="cancel" onclick="hideManualForm()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div id="eventModal" class="event-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button class="visit-btn" onclick="visitEvent()">Visit Website</button>
                <button class="edit-btn" onclick="editEvent()">Edit</button>
                <button class="delete-btn" onclick="deleteEvent()">Delete</button>
            </div>
        </div>
    </div>

    <script src="events-data.js"></script>
    <script src="storage.js"></script>
    <script src="calendar-app.js"></script>
</body>
</html>
